version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin 091584011942.dkr.ecr.ap-northeast-1.amazonaws.com/hai-handson-cicd-ecs

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t sample-apache .
      - docker tag sample-apache:latest 091584011942.dkr.ecr.ap-northeast-1.amazonaws.com/hai-handson-cicd-ecs:latest

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push 091584011942.dkr.ecr.ap-northeast-1.amazonaws.com/hai-handson-cicd-ecs:latest
