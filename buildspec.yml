version: 0.2

env:
  variables:
    ECR_REPOSITORY_ARN: arn:aws:ecr:ap-northeast-1:091584011942:repository/handsonecs-ecs-cicd

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin ${ECR_REPOSITORY_ARN}


  build:
    commands:
      - echo Building the Docker image...
      - docker build -t sample-apache .
      - docker tag sample-apache:latest ${ECR_REPOSITORY_ARN}:latest

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push ${ECR_REPOSITORY_ARN}:latest
