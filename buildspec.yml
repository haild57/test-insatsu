version: 0.2

phases:
  build:
    commands:
      - echo Building SpringBoot App...
      - cd app 
      - chmod +x mvnw
      - ./mvnw clean install
  post_build:
    commands:
      - echo Build completed
artifacts:
  files:
    - app/target/*.war
    - scripts/*.sh
    - appspec.yml
  discard-paths: yes