version: 0.2

phases:
  build:
    commands:
      - echo Building SpringBoot App...
      - cd app 
      - chmod +x mvnw
      - ./mvnw clean install
      - ./mvnw spring-boot:run

artifacts:
  files:
    - app/target/sample-springboot-app-0.0.1.war
    - appspec.yml
    - scripts/**/*
  discard-paths: no