version: 0.2

phases:
  build:
    commands:
      - echo Building SpringBoot App...
      # - java -junit /test
      # - junit covarage 
      
      - cd app 
      - chmod +x mvnw
      - ./mvnw clean install
      - mv target/*.war target/sample-java-app.war
  post_build:
    commands:
      - echo Build completed
artifacts:
  files:
    - app/target/sample-java-app.war
    - scripts/*.sh
    - appspec.yml
  discard-paths: yes