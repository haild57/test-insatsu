version: 0.0
os: linux

files:
  - source: sample-java-app.war
    destination: /usr/share

hooks:
  BeforeInstall:
    - location: server_clear.sh
      timeout: 300
      runas: root
  # AfterInstall:
  #   - location: fix_privileges.sh
  #     timeout: 300
  #     runas: root
  ApplicationStart:
    - location: server_start.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: server_stop.sh
      timeout: 300
      runas: root